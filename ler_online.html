    <!-- Touch Zones for Mobile Navigation -->

        // Initialize reader
        document.addEventListener('DOMContentLoaded', function() {
            loadSavedPreferences();
            loadSavedProgress();
            updateProgress();
        });

        // Chapter Navigation
        function loadChapter(chapterNum) {
            if (chapterNum < 1 || chapterNum > totalChapters) return;

            currentChapter = chapterNum;
            const chapter = chapters[chapterNum] || chapters[1];

            // Update content
            document.getElementById('chapterTitle').textContent = chapter.title;
            document.getElementById('currentChapterName').textContent = chapter.name;
            document.getElementById('readerContent').innerHTML = chapter.content;

            // Update UI
            updateProgress();
            updateChapterButtons();
            updateChapterSidebar();
            
            // Save progress
            saveProgress();

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Close sidebar on mobile
            if (window.innerWidth < 769) {
                toggleChapterSidebar();
            }
        }

        function nextChapter() {
            if (currentChapter < totalChapters) {
                loadChapter(currentChapter + 1);
            }
        }

        function previousChapter() {
            if (currentChapter > 1) {
                loadChapter(currentChapter - 1);
            }
        }

        function nextPage() {
            nextChapter();
        }

        function previousPage() {
            previousChapter();
        }

        // Update Progress
        function updateProgress() {
            const progress = (currentChapter / totalChapters) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('currentChapter').textContent = currentChapter;
            document.getElementById('totalChapters').textContent = totalChapters;
            document.getElementById('readingProgress').textContent = progress.toFixed(1) + '%';
        }

        // Update Chapter Buttons
        function updateChapterButtons() {
            const prevBtn = document.getElementById('prevChapterBtn');
            const nextBtn = document.getElementById('nextChapterBtn');

            prevBtn.disabled = currentChapter === 1;
            nextBtn.disabled = currentChapter === totalChapters;

            if (prevBtn.disabled) {
                prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            if (nextBtn.disabled) {
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // Update Chapter Sidebar
        function updateChapterSidebar() {
            const items = document.querySelectorAll('.chapter-item');
            items.forEach((item, index) => {
                if (index + 1 === currentChapter) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Toggle Chapter Sidebar
        function toggleChapterSidebar() {
            const sidebar = document.getElementById('chapterSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Toggle Settings Menu
        function toggleSettingsMenu() {
            const menu = document.getElementById('settingsMenu');
            menu.classList.toggle('hidden');
        }

        // Close settings menu when clicking outside
        document.addEventListener('click', function(event) {
            const settingsMenu = document.getElementById('settingsMenu');
            const settingsButton = event.target.closest('button[onclick="toggleSettingsMenu()"]');
            
            if (!settingsButton && !settingsMenu.contains(event.target)) {
                settingsMenu.classList.add('hidden');
            }
        });

        // Font Size Control
        function changeFontSize(size) {
            fontSize = size;
            const body = document.getElementById('readerBody');
            
            body.classList.remove('font-size-sm', 'font-size-md', 'font-size-lg', 'font-size-xl');
            body.classList.add('font-size-' + size);
            
            savePreferences();
        }

        // Theme Control
        function changeTheme(newTheme) {
            theme = newTheme;
            const body = document.getElementById('readerBody');
            
            body.classList.remove('theme-sepia', 'theme-dark');
            
            if (newTheme === 'sepia') {
                body.classList.add('theme-sepia');
            } else if (newTheme === 'dark') {
                body.classList.add('theme-dark');
            }
            
            savePreferences();
        }

        // Bookmark Functionality
        function addBookmark() {
            const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
            const bookmark = {
                book: 'Dom Casmurro',
                chapter: currentChapter,
                chapterName: chapters[currentChapter].name,
                timestamp: new Date().toISOString()
            };
            
            bookmarks.push(bookmark);
            localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
            
            // Show success message (you could implement a toast notification)
            alert('Marcador adicionado com sucesso!');
        }

        // Share Reading
        function shareReading() {
            const shareData = {
                title: 'Dom Casmurro - Williete Online Library',
                text: `Estou lendo "${chapters[currentChapter].name}" de Dom Casmurro`,
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData)
                    .catch(err => console.log('Error sharing:', err));
            } else {
                // Fallback for browsers that don't support Web Share API
                const url = window.location.href;
                navigator.clipboard.writeText(url)
                    .then(() => alert('Link copiado para a área de transferência!'))
                    .catch(err => console.log('Error copying:', err));
            }
        }

        // Save Progress
        function saveProgress() {
            const progress = {
                book: 'Dom Casmurro',
                chapter: currentChapter,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('readingProgress', JSON.stringify(progress));
        }

        // Load Saved Progress
        function loadSavedProgress() {
            const saved = localStorage.getItem('readingProgress');
            if (saved) {
                const progress = JSON.parse(saved);
                if (progress.book === 'Dom Casmurro') {
                    currentChapter = progress.chapter;
                    loadChapter(currentChapter);
                }
            }
        }

        // Save Preferences
        function savePreferences() {
            const preferences = {
                fontSize: fontSize,
                theme: theme
            };
            localStorage.setItem('readerPreferences', JSON.stringify(preferences));
        }

        // Load Saved Preferences
        function loadSavedPreferences() {
            const saved = localStorage.getItem('readerPreferences');
            if (saved) {
                const preferences = JSON.parse(saved);
                changeFontSize(preferences.fontSize);
                changeTheme(preferences.theme);
            }
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', function(event) {
            // Left arrow - previous chapter
            if (event.key === 'ArrowLeft') {
                previousChapter();
            }
            // Right arrow - next chapter
            else if (event.key === 'ArrowRight') {
                nextChapter();
            }
            // Escape - close sidebar/settings
            else if (event.key === 'Escape') {
                const sidebar = document.getElementById('chapterSidebar');
                const overlay = document.getElementById('sidebarOverlay');
                const settingsMenu = document.getElementById('settingsMenu');
                
                if (sidebar.classList.contains('active')) {
                    toggleChapterSidebar();
                }
                if (!settingsMenu.classList.contains('hidden')) {
                    settingsMenu.classList.add('hidden');
                }
            }
            // B - add bookmark
            else if (event.key === 'b' || event.key === 'B') {
                addBookmark();
            }
        });

        // Touch Gestures for Mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
        }, false);

        document.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        }, false);

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    // Swipe left - next chapter
                    nextChapter();
                } else {
                    // Swipe right - previous chapter
                    previousChapter();
                }
            }
        }

        // Auto-save progress on page unload
        window.addEventListener('beforeunload', function() {
            saveProgress();
            savePreferences();
        });
    </script>
